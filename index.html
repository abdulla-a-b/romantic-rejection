<!DOCTYPE html>
<html>
<head>
<title>Romantic Rejection Q Survey</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Romantic Rejection Q Methodology Survey</h1>

<p>Rate each statement from -4 (Strongly Disagree) to +4 (Strongly Agree)</p>
  <table> 
    <tr>
      <th> Agree / Disagree Options</th>
      <th> Score</th>
    </tr>
    <tr>
      <td>Most Strongly Disagree</td>
      <td>-4</td>
    </tr>
    <tr>
      <td> Strongly Disagrre</td>
      <td>-3</td>
    </tr>
    <tr> 
      <td>Disagree</td>
      <td>-2</td>
    </tr>
    <tr>
      <td>Slightly Disagree</td>
      <td>-1</td>
    </tr>
    <tr>
      <td>Slightly Agree</td>
      <td>1</td>
    </tr>
    <tr>
      <td>Agree</td>
      <td>2</td>
    </tr>
    <tr>
      <td>Strongly Agree</td>
      <td>3</td>
    </tr>
    <tr>
      <td>Most Strongly Agree</td>
      <td>4</td>
    </tr>
  </table>

<div id="survey"></div>

<button onclick="submitSurvey()">Submit Survey</button>

<p id="status"></p>

<script src="survey.js"></script>

</body>
</html>
